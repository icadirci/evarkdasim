spring:
  application:
    name: evarkadasim-api
  threads:
    virtual:
      enabled: true # Java 21+ kullanıyorsan bu çok iyi, performans uçar!

  jpa:
    database: POSTGRESQL
    show-sql: true
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true # SQL'leri okunaklı basar
        dialect: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    url: jdbc:postgresql://localhost:5432/evarkadasim_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always # data.sql'i her zaman okumaya zorlar